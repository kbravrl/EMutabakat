services:
  db:
    image: postgres:15
    container_name: emutabakat_db
    restart: always
    environment:
      POSTGRES_DB: emutabakatdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - emutabakat_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emutabakatdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: emutabakat_app
    ports:
      - "5000:8080"
    volumes:
      - D:/EMutabakatRedDosyalari:/app/wwwroot/uploads
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=emutabakatdb;Username=postgres;Password=postgres
      - Storage__RootPath=/app/wwwroot/uploads
    networks:
      - emutabakat_network

volumes:
  postgres_data:

networks:
  emutabakat_network: